<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Chat</title>

<style>
body{
margin:0;
background:#0b1220;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:500px;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
background:#111827;
padding:12px;
text-align:center;
font-weight:bold;
}

/* CHAT */
#messages{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
background:#1f2937;
padding:10px;
border-radius:12px;
max-width:75%;
word-break:break-word;
}

.me{
background:#22c55e;
align-self:flex-end;
}

.meta{
font-size:11px;
color:#9ca3af;
margin-bottom:5px;
}

/* IMAGE */
img{
max-width:160px;
border-radius:10px;
margin-top:5px;
}

/* TYPING */
#typing{
padding:5px 10px;
font-size:12px;
color:#9ca3af;
height:20px;
}

/* INPUT */
.input{
display:flex;
gap:8px;
padding:10px;
background:#111827;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
outline:none;
background:#1f2937;
color:white;
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* LOGIN */
#login{
position:absolute;
inset:0;
background:#0b1220;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
width:90%;
max-width:300px;
}

.card input{
width:100%;
margin:5px 0;
}
</style>
</head>

<body>

<div class="app">

<div class="header">⚡ Anas Chat</div>

<div id="typing"></div>

<ul id="messages"></ul>

<div class="input">
<input id="msg" placeholder="اكتب رسالة..." oninput="typing()" onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">➤</button>
</div>

</div>

<!-- LOGIN -->
<div id="login">

<div class="card">
<h3>دخول</h3>
<input id="user" placeholder="اسمك">
<input id="room" placeholder="الغرفة">
<input id="pass" placeholder="كلمة السر">
<button onclick="join()">دخول</button>
</div>

<div class="card">
<h3>إنشاء غرفة</h3>
<input id="rname" placeholder="اسم الغرفة">
<input id="rpass" placeholder="كلمة السر">
<button onclick="create()">إنشاء</button>
</div>

</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();

let user="",room="";

/* JOIN */
function join(){
user=document.getElementById("user").value;
room=document.getElementById("room").value;

socket.emit("join",{
username:user,
room:room,
password:pass.value
});

document.getElementById("login").style.display="none";
}

/* CREATE */
function create(){
fetch("/create_room",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:rname.value,
password:rpass.value
})
}).then(r=>r.json()).then(d=>alert(d.msg));
}

/* SEND */
function send(){
if(!msg.value.trim()) return;

socket.emit("message",{
username:user,
room:room,
msg:msg.value,
time:new Date().toLocaleTimeString()
});

msg.value="";
}

/* RECEIVE */
socket.on("message",d=>{
let li=document.createElement("li");
li.className="msg"+(d.username===user?" me":"");

li.innerHTML=`
<div class="meta">${d.username} • ${d.time || ""}</div>
${d.file ? `<img src="/static/uploads/${d.file}">` : d.msg}
`;

messages.appendChild(li);
messages.scrollTop=messages.scrollHeight;
});

/* TYPING */
function typing(){
socket.emit("typing",{username:user,room});
}

socket.on("typing",d=>{
if(d.username===user) return;
typing.innerText = "✍ " + d.username + " يكتب...";
setTimeout(()=>typing.innerText="",800);
});
</script>

</body>
</html>
