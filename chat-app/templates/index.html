<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Fast Chat</title>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;display:flex}
.chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:10px;list-style:none}
.msg{background:#1e293b;padding:10px;border-radius:10px;max-width:60%}
.me{align-self:flex-end;background:#22c55e}
.meta{font-size:12px;color:#94a3b8}
img{max-width:180px;border-radius:10px}
.input{display:flex;gap:10px;padding:10px;background:#1e293b}
input,button{padding:10px;border:none;border-radius:8px}
button{background:#22c55e;color:white}
#typing{padding:5px 10px;color:#94a3b8;font-size:13px}
</style>
</head>

<body>

<div class="chat">

<div id="typing"></div>

<ul id="messages"></ul>

<div class="input">
<input type="file" id="file">
<input id="msg" placeholder="اكتب..." oninput="typing()" onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">إرسال</button>
</div>

</div>

<!-- LOGIN -->
<div id="login" style="position:absolute;inset:0;background:#0f172a;display:flex;gap:20px;justify-content:center;align-items:center">

<div>
<input id="user" placeholder="اسمك"><br><br>
<input id="room" placeholder="غرفة"><br><br>
<input id="pass" placeholder="كلمة السر"><br><br>
<button onclick="join()">دخول</button>
</div>

<div>
<input id="rname" placeholder="اسم غرفة"><br><br>
<input id="rpass" placeholder="كلمة السر"><br><br>
<button onclick="create()">إنشاء</button>
</div>

</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
const socket = io();

let user="",room="";

/* join */
function join(){
user=user||document.getElementById("user").value;
room=document.getElementById("room").value;

socket.emit("join",{username:user,room:room,password:document.getElementById("pass").value});
document.getElementById("login").style.display="none";
}

/* create */
function create(){
fetch("/create_room",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:rname.value,
password:rpass.value
})
}).then(r=>r.json()).then(d=>alert(d.msg));
}

/* send */
function send(){
let m=msg.value;
if(!m) return;

socket.emit("message",{username:user,room,msg:m});
msg.value="";
}

/* typing */
function typing(){
socket.emit("typing",{username:user,room});
}

/* receive */
socket.on("message",d=>{
let li=document.createElement("li");
li.className="msg"+(d.username===user?" me":"");

li.innerHTML=`<div class="meta">${d.username}</div>`+
(d.file?`<img src="/static/uploads/${d.file}">`:d.msg);

messages.appendChild(li);
messages.scrollTop=messages.scrollHeight;
});

/* upload fast */
file.onchange=async ()=>{
let f=file.files[0];
if(!f) return;

let fd=new FormData();
fd.append("file",f);

let r=await fetch("/upload",{method:"POST",body:fd});
let name=await r.text();

socket.emit("message",{username:user,room,file:name});
};

/* typing show */
socket.on("typing",d=>{
if(d.username===user) return;
typing.innerText = d.username + " يكتب...";
setTimeout(()=>typing.innerText="",1000);
});
</script>

</body>
</html>
