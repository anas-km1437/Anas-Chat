<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Anas Chat</title>

<style>
body { margin:0; background:#0f172a; color:white; font-family:Arial; display:flex; }
.sidebar { width:250px; background:#020617; padding:15px; }
.chat { flex:1; display:flex; flex-direction:column; }
#messages { flex:1; overflow:auto; padding:20px; list-style:none; display:flex; flex-direction:column; gap:10px; }
.message-item { max-width:70%; padding:10px; border-radius:10px; background:#1e293b; }
.my-message { align-self:flex-end; background:#22c55e; }
.input-bar { display:flex; gap:10px; padding:10px; background:#1e293b; }
input,button { padding:10px; border:none; border-radius:10px; }
button { background:#22c55e; color:white; }
.progress-bar { height:5px; background:#334155; }
.progress { height:100%; width:0%; background:#22c55e; }
</style>
</head>

<body>

<div class="sidebar">
<h3>المتصلون</h3>
<ul id="users"></ul>
</div>

<div class="chat">
<ul id="messages"></ul>

<div class="input-bar">
<input type="file" id="file" onchange="sendFile()">
<input id="msg" placeholder="اكتب رسالة">
<button onclick="sendMessage()">إرسال</button>
</div>
</div>

<div id="login">
<input id="username" placeholder="اسمك">
<input id="room" placeholder="الغرفة">
<input id="password" placeholder="كلمة السر">
<button onclick="joinRoom()">دخول</button>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();

let username = "";
let currentRoom = "";

/* دخول */
function joinRoom(){
    username = document.getElementById("username").value;
    currentRoom = document.getElementById("room").value;
    let password = document.getElementById("password").value;

    socket.emit("join",{username, room:currentRoom, password});
}

/* رسالة */
function sendMessage(){
    let msgInput = document.getElementById("msg");
    if(!msgInput.value.trim()) return;

    socket.emit("message",{username, room:currentRoom, msg:msgInput.value});
    msgInput.value="";
}

/* استقبال */
socket.on("message",data=>{
    let li=document.createElement("li");
    li.className="message-item"+(data.username===username?" my-message":"");

    li.innerHTML = data.file ?
    `<b>${data.username}</b><br><img src="/static/uploads/${data.file}">`
    :
    `<b>${data.username}</b><br>${data.msg}`;

    document.getElementById("messages").appendChild(li);
});

/* رفع */
async function sendFile(){
    let file=document.getElementById("file").files[0];
    if(!file) return;

    socket.emit("uploading",{username,room:currentRoom});

    const chunkSize=1024*200;
    let offset=0,index=0;

    while(offset<file.size){
        let chunk=file.slice(offset,offset+chunkSize);

        let fd=new FormData();
        fd.append("chunk",chunk);
        fd.append("filename",file.name);
        fd.append("index",index);

        await fetch("/upload_chunk",{method:"POST",body:fd});

        offset+=chunkSize;
        index++;
    }

    socket.emit("message",{username,room:currentRoom,file:file.name});
}
</script>

</body>
</html>
